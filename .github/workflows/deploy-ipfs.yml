name: Deploy to IPFS

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build
        env:
          TINA_CLIENT_ID: ${{ secrets.TINACLIENTID }}
          TINA_TOKEN: ${{ secrets.TINATOKEN }}

      - name: Clear storacha CLI cache
        run: rm -rf ~/.config/storacha-cli

      - name: Upload to Storacha (IPFS + Filecoin)
        uses: storacha/add-to-web3@v4
        id: upload
        env:
          STORACHA_STORE_NAME: storacha-deploy-${{ github.run_id }}
        with:
          path_to_add: 'out'
          secret_key: ${{ secrets.STORACHAPRINCIPAL }}
          proof: ${{ secrets.W3PROOF }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.DNSAPITOKEN }}
          accountId: ${{ secrets.CLOUDFLAREACCOUNTID }}
          command: pages deploy out/ --project-name=society-protocol

      - name: Deployment summary
        if: steps.upload.outputs.cid != ''
        run: |
          echo "## Deployment Complete"
          echo "CID: ${{ steps.upload.outputs.cid }}"
          echo "IPFS: https://storacha.link/ipfs/${{ steps.upload.outputs.cid }}"
          echo "Site: https://new.societyprotocol.io"
